name: Build RustDesk Windows Server

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Target release tag
        required: true
        default: 2026-0703-0841
      source_ref:
        description: Source git ref for ops-platform server code
        required: true
        default: main

permissions:
  contents: write

jobs:
  build-windows-server:
    runs-on: windows-2022
    steps:
      - name: Checkout package repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.90.0
          targets: x86_64-pc-windows-msvc

      - name: Prepare SQLx compile database
        shell: pwsh
        working-directory: sources/rustdesk-server
        run: |
          python - <<'PY'
          import sqlite3
          conn = sqlite3.connect('sqlx-compile.sqlite3')
          conn.executescript('''
          create table if not exists peer (
              guid blob primary key not null,
              id varchar(100) not null,
              uuid blob not null,
              pk blob not null,
              created_at datetime not null default(current_timestamp),
              user blob,
              status tinyint,
              note varchar(300),
              info text not null
          ) without rowid;
          create unique index if not exists index_peer_id on peer (id);
          create index if not exists index_peer_user on peer (user);
          create index if not exists index_peer_created_at on peer (created_at);
          create index if not exists index_peer_status on peer (status);
          ''')
          conn.close()
          PY

      - name: Build hbbs and hbbr
        shell: pwsh
        working-directory: sources/rustdesk-server
        env:
          DATABASE_URL: sqlite://sqlx-compile.sqlite3
        run: |
          cargo build --release --all-features --target x86_64-pc-windows-msvc

      - name: Package server zip
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $out = Join-Path $PWD 'dist/rustdesk-server-windows-x86_64'
          New-Item -ItemType Directory -Force -Path $out | Out-Null
          Copy-Item 'sources/rustdesk-server/target/x86_64-pc-windows-msvc/release/hbbs.exe' $out
          Copy-Item 'sources/rustdesk-server/target/x86_64-pc-windows-msvc/release/hbbr.exe' $out
          if (Test-Path 'sources/rustdesk-server/target/x86_64-pc-windows-msvc/release/rustdesk-utils.exe') {
            Copy-Item 'sources/rustdesk-server/target/x86_64-pc-windows-msvc/release/rustdesk-utils.exe' $out
          }
          @'
          RustDesk Windows Server Package

          Files:
          - hbbs.exe: ID/rendezvous server
          - hbbr.exe: relay server
          - rustdesk-utils.exe: utility binary, if included

          Quick start:
          1. Extract this zip on Windows Server.
          2. Open PowerShell in this folder.
          3. Run hbbs.exe and hbbr.exe, or install them as Windows services with your normal service manager.

          Ports normally required:
          - 21115 TCP
          - 21116 TCP/UDP
          - 21117 TCP
          - 21118 TCP, if web client/API is used
          - 21119 TCP, if web client/API is used
          '@ | Set-Content -Encoding UTF8 (Join-Path $out 'README-WINDOWS-SERVER.txt')
          Compress-Archive -Path "$out/*" -DestinationPath 'dist/rustdesk-server-windows-x86_64.zip' -Force

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          files: dist/rustdesk-server-windows-x86_64.zip
