# RustDesk Server Docker Compose 配置
# 使用官方镜像，通过挂载持久化密钥确保多次部署公钥不变
#
# 密钥文件说明：
# - id_ed25519: 私钥，用于服务器签名
# - id_ed25519.pub: 公钥，客户端需要配置此公钥才能连接
#
# 使用方法：
# 1. 确保 ../data/ 目录下存在 id_ed25519 和 id_ed25519.pub
# 2. docker-compose up -d

networks:
  rustdesk-net:
    external: false

services:
  hbbr:
    container_name: hbbr
    image: rustdesk/rustdesk-server:1.1.11
    ports:
      - "21117:21117"
      - "21119:21119"
    command: hbbr
    volumes:
      # 挂载数据目录，包含密钥和数据库
      - ../data:/root
    networks:
      - rustdesk-net
    restart: unless-stopped

  hbbs:
    container_name: hbbs
    image: rustdesk/rustdesk-server:1.1.11
    ports:
      - "21115:21115"
      - "21116:21116"
      - "21116:21116/udp"
      - "21118:21118"
    # -r 参数指定中继服务器地址，这里使用容器名通过内部网络通信
    # 生产环境部署时需要改成实际的公网 IP 或域名
    command: hbbs -r hbbr:21117
    volumes:
      - ../data:/root
    networks:
      - rustdesk-net
    depends_on:
      - hbbr
    restart: unless-stopped
